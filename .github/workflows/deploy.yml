name: Auto Deploy

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server host key
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 47.93.44.247 >> ~/.ssh/known_hosts

    - name: Ensure rsync on server
      run: |
        ssh -o StrictHostKeyChecking=no root@47.93.44.247 << 'ENDSSH'
          set -e
          if command -v rsync >/dev/null 2>&1; then
            echo "rsync already installed"
            exit 0
          fi

          echo "Installing rsync..."
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y rsync
          elif command -v yum >/dev/null 2>&1; then
            yum install -y rsync
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y rsync
          else
            echo "ERROR: no supported package manager found to install rsync"
            exit 127
          fi
        ENDSSH

    - name: Sync project to server
      run: |
        rsync -az --delete \
          --exclude ".git/" \
          --exclude "frontend/node_modules/" \
          --exclude "**/__pycache__/" \
          --exclude "**/*.pyc" \
          -e "ssh" \
          ./ root@47.93.44.247:/opt/ai_softomanger/
    
    - name: Deploy to Server
      run: |
        ssh -o StrictHostKeyChecking=no root@47.93.44.247 << 'ENDSSH'
          set -e
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"

          echo "=== Env ==="
          whoami || true
          echo "PATH=$PATH"

          git config --global --add safe.directory /opt/ai_softomanger
          cd /opt/ai_softomanger

          if command -v git >/dev/null 2>&1; then
            git fetch origin master || true
            git reset --hard origin/master || true
            git clean -fd || true
            git pull origin master || true
          fi

          # 统一调用仓库内脚本：自动执行 docker compose 或 sudo docker compose up -d --build
          if [ -f scripts/docker-compose-redeploy.sh ]; then
            chmod +x scripts/docker-compose-redeploy.sh || true
            bash scripts/docker-compose-redeploy.sh
          else
            echo "ERROR: scripts/docker-compose-redeploy.sh 不存在，请确认 rsync 已同步最新代码"
            exit 1
          fi
        ENDSSH
    
    - name: Deployment Complete
      run: echo "Deployment completed successfully"
