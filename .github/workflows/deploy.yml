name: Auto Deploy

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server host key
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 47.93.44.247 >> ~/.ssh/known_hosts

    - name: Sync project to server
      run: |
        rsync -az --delete \
          --exclude ".git/" \
          --exclude "frontend/node_modules/" \
          --exclude "**/__pycache__/" \
          --exclude "**/*.pyc" \
          -e "ssh" \
          ./ root@47.93.44.247:/opt/ai_softomanger/
    
    - name: Deploy to Server
      run: |
        ssh -o StrictHostKeyChecking=no root@47.93.44.247 << 'ENDSSH'
          set -e
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"

          echo "=== Env ==="
          whoami || true
          pwd || true
          echo "PATH=$PATH"

          echo "=== Docker ==="
          command -v docker
          docker --version

          echo "=== Compose detect ==="
          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "ERROR: docker compose / docker-compose not found in PATH"
            exit 127
          fi
          echo "Using: $COMPOSE"
          $COMPOSE version || true

          cd /opt/ai_softomanger
          $COMPOSE down
          $COMPOSE up -d --build
          $COMPOSE restart nginx
        ENDSSH
    
    - name: Deployment Complete
      run: echo "Deployment completed successfully"
