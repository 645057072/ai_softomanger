services:
  backend:
    build:
      context: .
      args:
        PYTHON_IMAGE: registry.cn-hangzhou.aliyuncs.com/library/python:3.9-slim
    container_name: exam-system-backend
    ports:
      - "5001:5001"
    volumes:
      - ./uploads:/app/uploads
      - ./exam_system:/app/exam_system
    environment:
      - SECRET_KEY=your-secret-key-here
      - SQLALCHEMY_DATABASE_URI=sqlite:////app/exam_system/exam_system.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - exam-network

  redis:
    image: registry.cn-hangzhou.aliyuncs.com/library/redis:6-alpine
    container_name: exam-system-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - exam-network

  frontend:
    image: registry.cn-hangzhou.aliyuncs.com/library/node:18-alpine
    container_name: exam-system-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - ./frontend/dist:/app/frontend/dist
    command: sh -c "cd /app/frontend && npm install --registry=https://registry.npmmirror.com && npm run build"
    restart: "no"
    networks:
      - exam-network

  nginx:
    image: registry.cn-hangzhou.aliyuncs.com/library/nginx:alpine
    container_name: exam-system-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge
