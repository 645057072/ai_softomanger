# 考试系统 Docker Compose（MySQL 8.0 + Redis + 后端 + 前端多阶段镜像 + 入口 Nginx 反代）
#
# 重要：
# - backend 的 build.context 必须为项目根目录「.」。若写成 ./exam_system，镜像内缺少依赖与 Dockerfile，会导致后端反复重启。
# - 生产环境请复制 .env.example 为 .env 并修改默认密码；未提供 .env 时使用下列默认值（仅便于首次拉起）。
# - 数据库服务名为 db，与 MYSQL_HOST=db 一致。
# - 入口 nginx 使用本仓库 nginx/Dockerfile；勿改用仅 image: nginx:alpine 且无反代 frontend 的配置，否则会显示默认欢迎页。

services:
  db:
    image: mysql:8.0
    container_name: exam-system-db
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-exam_system}"
      MYSQL_USER: "${MYSQL_USER:-exam_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-exam_pass}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-exam_root_pass}"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped
    networks:
      - exam-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam-system-backend
    expose:
      - "5001"
    volumes:
      - ./uploads:/app/uploads
      - ./exam_system:/app/exam_system
    environment:
      SECRET_KEY: "${SECRET_KEY:-your-secret-key-here}"
      # 二选一传入容器；均未设置时由 exam_system/config.py 使用内置默认值
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-}"
      JWT_SECRET: "${JWT_SECRET:-}"
      FLASK_CONFIG: production
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_USER: "${MYSQL_USER:-exam_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-exam_pass}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-exam_system}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - exam-network

  redis:
    image: redis:6-alpine
    container_name: exam-system-redis
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - exam-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exam-system-frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - exam-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: exam-system-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge

volumes:
  mysql_data:
